name: deploy

on:
  push:
    branches:
      - production

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/tests.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@28fc45e5e8d71cd7d2c3e5b3ef0f1b7e5d2e6b9f # v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            bash deploy.sh production
